name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v2
      with:
        node-version: ${{ matrix.node-version }}
    - run: npm install
    - run: npm start
    
    # 🔥 ADICIONADO: SALVAR DADOS APÓS RODAR O BOT
    - name: Salvar dados no repositório
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/usersData.json
        git diff --staged --quiet || git commit -m "🔄 Atualiza dados do bot [skip ci]"
        git push
